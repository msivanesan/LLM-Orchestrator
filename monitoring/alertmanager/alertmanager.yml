global:
  resolve_timeout: 5m
  smtp_smarthost:  'smtp.gmail.com:587'
  smtp_from:       '${ALERT_EMAIL_FROM}'
  smtp_auth_username: '${ALERT_EMAIL_FROM}'
  smtp_auth_password: '${ALERT_EMAIL_PASSWORD}'
  smtp_require_tls: true

# Routing tree
route:
  group_by:       ['alertname', 'service']
  group_wait:     30s       # wait before sending first alert batch
  group_interval: 5m        # how long to wait before sending new alerts in group
  repeat_interval: 1h       # how often to re-send unresolved alerts

  receiver: 'default'

  routes:
    # Critical alerts → immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 15m

    # Brute force → separate channel
    - match:
        alertname: BruteForceDetected
      receiver: 'security-alerts'
      group_wait: 5s

    # LLM alerts → ops team
    - match:
        alertname: LLMHighFailureRate
      receiver: 'critical-alerts'

receivers:

  - name: 'default'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        send_resolved: true
        html: |
          {{ range .Alerts }}
          <b>{{ .Labels.alertname }}</b><br>
          {{ .Annotations.summary }}<br>
          {{ .Annotations.description }}<br>
          Status: {{ .Status }}<br><br>
          {{ end }}

  - name: 'critical-alerts'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '🔴 CRITICAL: {{ .GroupLabels.alertname }} — LLM Orchestrator'

  - name: 'security-alerts'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '🚨 SECURITY ALERT: {{ .GroupLabels.alertname }}'

inhibit_rules:
  # If service is down, suppress high-error-rate alert for same service
  - source_match:
      alertname: ServiceDown
    target_match:
      alertname: ServiceHighErrorRate
    equal: ['service']
