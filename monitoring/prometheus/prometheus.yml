global:
  scrape_interval:     15s   # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate rules
  scrape_timeout:      10s

  # Labels added to every time series scraped from this Prometheus
  external_labels:
    monitor: 'llm-orchestrator'
    env:     'production'

# Load alerting rules
rule_files:
  - /etc/prometheus/alerts/*.yml

# Alertmanager config
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:

  # ── Prometheus self-monitoring ────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Nginx Gateway ─────────────────────────────────────────────────────────────
  - job_name: 'nginx'
    static_configs:
      - targets: ['host.docker.internal:9113']   # nginx-prometheus-exporter
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'nginx-gateway'

  # ── User Service (Flask :5001) ────────────────────────────────────────────────
  - job_name: 'user-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:5001']
        labels:
          service: 'user'
          port:    '5001'

  # ── ApiKey Service (Flask :5002) ──────────────────────────────────────────────
  - job_name: 'apikey-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:5002']
        labels:
          service: 'apikey'
          port:    '5002'

  # ── AI Service (Flask :5003) ──────────────────────────────────────────────────
  - job_name: 'ai-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:5003']
        labels:
          service: 'ai'
          port:    '5003'

  # ── Chat Service (Flask :5004) ────────────────────────────────────────────────
  - job_name: 'chat-service'
    metrics_path: '/metrics'
    scrape_interval: 10s   # scrape more frequently (active service)
    static_configs:
      - targets: ['host.docker.internal:5004']
        labels:
          service: 'chat'
          port:    '5004'

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'

  # ── Node / System metrics (host) ──────────────────────────────────────────────
  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          instance: 'host'
