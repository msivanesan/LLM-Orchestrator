server {
    listen 80;

    # Global CORS Handling
    add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-KEY' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

    # Handle OPTIONS preflight requests globally
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # 1. Identity Manager (User Service)
    location /api/users/ {
        proxy_pass http://host.docker.internal:5001/api/users/;
    }

    # 2. Integration Manager (ApiKey Service)
    location /api/apikeys/ {
        proxy_pass http://host.docker.internal:5002/api/apikeys/;
    }

    # 3. AI ORCHESTRATION LAYER (New AI service)
    location /api/ai/ {
        auth_request /internal/validate;
        proxy_pass http://host.docker.internal:5003/api/ai/;
        
        # Increase timeouts for long-running AI generation
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 4. Chat Service (User-auth only, JWT Bearer — SSE streaming)
    location /api/chat/ {
        proxy_pass            http://host.docker.internal:5004/api/chat/;
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;

        # Required for SSE / HTTP streaming — do NOT buffer
        proxy_buffering       off;
        proxy_cache           off;
        proxy_http_version    1.1;
        chunked_transfer_encoding on;
    }

    # 4. Security Sidecar (INTERNAL ONLY)
    location = /internal/validate {
        internal;
        proxy_pass http://host.docker.internal:5002/api/apikeys/validate_header;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    # 5. Monitoring metrics (for llm_nginx_exporter)
    location /nginx_status {
        stub_status on;
        access_log off;
        allow all;   # Inside docker-compose it's protected by host-gateway usually, but simplified for dev
    }

    # Unified Error Translators (Rejection -> 429)
    error_page 403 = @forbidden_to_rate_limited;
    location @forbidden_to_rate_limited {
        add_header Content-Type application/json;
        return 429 '{"status": 429, "error": "Rate Limit Exceeded", "message": "Slow down! You have reached your quota."}';
    }

    error_page 401 = @unauthorized;
    location @unauthorized {
        add_header Content-Type application/json;
        return 401 '{"status": 401, "error": "Unauthorized", "message": "Valid X-API-KEY required"}';
    }
}
