include:
  - path: ollama.fragment.yml
  # To use vLLM, comment out the line above and uncomment the line below:
  # - path: vllm.fragment.yml

services:
  # ══════════════════════════════════════════════════════════════════
  # EXISTING INFRASTRUCTURE
  # ══════════════════════════════════════════════════════════════════

  gateway:
    image: nginx:latest
    container_name: llm_orchestrator_gateway
    ports:
      - "${GATEWAY_PORT:-80}:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/templates:ro
    environment:
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-sec-srv-8f2e-4b9a-1c5d-0e3f-6g7h8i9j}
    depends_on:
      - redis
      - chromadb
      - user
      - apikey
      - ai
      - chat
      - frontend
    restart: always
    networks:
      - llm_net

  redis:
    image: redis:7-alpine
    container_name: llm_orchestrator_cache
    volumes:
      - redis_data:/data
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - llm_net

  postgres:
    image: postgres:16-alpine
    container_name: llm_orchestrator_db
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres123}
      - POSTGRES_DB=${DB_NAME:-llm_orchestrator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - llm_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: llm_orchestrator_chromadb
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=chromadb.auth.token.TokenConfigServerAuthCredentialsProvider
      - CHROMA_SERVER_AUTH_TOKEN_TRANSPORT_HEADER=Authorization
      - CHROMA_SERVER_AUTH_CREDENTIALS=${CHROMA_AUTH_TOKEN:-changeme-chroma-token}
      - CHROMA_SERVER_AUTH_PROVIDER=chromadb.auth.token.TokenAuthServerProvider
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: always
    networks:
      - llm_net

  # ══════════════════════════════════════════════════════════════════
  # APM STACK
  # ══════════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:latest
    container_name: llm_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: always
    networks:
      - llm_net
    depends_on:
      - alertmanager
      - nginx-exporter

  alertmanager:
    image: prom/alertmanager:latest
    container_name: llm_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    environment:
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-sec-srv-8f2e-4b9a-1c5d-0e3f-6g7h8i9j}
    restart: always
    networks:
      - llm_net

  grafana:
    image: grafana/grafana:latest
    container_name: llm_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
    restart: always
    networks:
      - llm_net
    depends_on:
      - prometheus

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: llm_redis_exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    restart: always
    networks:
      - llm_net
    depends_on:
      - redis

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: llm_nginx_exporter
    command:
      - -nginx.scrape-uri=http://gateway:80/nginx_status
    restart: always
    networks:
      - llm_net

  # ══════════════════════════════════════════════════════════════════
  # BACKEND MICROSERVICES
  # ══════════════════════════════════════════════════════════════════

  user:
    build: ./user
    image: llm-user:latest
    container_name: llm_orchestrator_user
    environment:
      - USER_DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgres:5432/${DB_NAME:-llm_orchestrator}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-yoursecretkeyhere}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-jwt-key}
      - USER_SERVICE_PORT=${USER_SERVICE_PORT:-5001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-sec-srv-8f2e-4b9a-1c5d-0e3f-6g7h8i9j}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - llm_net

  apikey:
    build: ./apikey
    image: llm-apikey:latest
    container_name: llm_orchestrator_apikey
    environment:
      - APIKEY_DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgres:5432/${DB_NAME:-llm_orchestrator}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-yoursecretkeyhere}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-jwt-key}
      - APIKEY_SERVICE_PORT=${APIKEY_SERVICE_PORT:-5002}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-sec-srv-8f2e-4b9a-1c5d-0e3f-6g7h8i9j}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - llm_net

  mailer:
    build: ./mailer
    image: llm-mailer:latest
    container_name: llm_orchestrator_mailer
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - MAIL_SERVER=${MAIL_SERVER:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-True}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-sec-srv-8f2e-4b9a-1c5d-0e3f-6g7h8i9j}
    depends_on:
      redis:
        condition: service_started
    restart: always
    networks:
      - llm_net

  ai:
    build: ./ai
    image: llm-ai:latest
    container_name: llm_orchestrator_ai
    environment:
      - AI_ENGINE_URL=${AI_ENGINE_URL:-http://ollama:11434/v1/chat/completions}
      - AI_SERVICE_PORT=${AI_SERVICE_PORT:-5003}
      - GUNICORN_WORKERS=${AI_WORKERS:-2}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-sec-srv-8f2e-4b9a-1c5d-0e3f-6g7h8i9j}
    depends_on:
      ollama:
        condition: service_healthy
    restart: always
    networks:
      - llm_net

  chat:
    build: ./chat
    image: llm-chat:latest
    container_name: llm_orchestrator_chat
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgres:5432/${DB_NAME:-llm_orchestrator}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CHAT_SERVICE_PORT=${CHAT_SERVICE_PORT:-5004}
      - SECRET_KEY=${SECRET_KEY:-yoursecretkeyhere}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-jwt-key}
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://ai:5003}
      - CHROMA_HOST=${CHROMA_HOST:-chromadb}
      - CHROMA_PORT=${CHROMA_PORT:-8000}
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-changeme-chroma-token}
      - GUNICORN_WORKERS=${CHAT_WORKERS:-2}
      - TRANSFORMERS_OFFLINE=1
      - HF_HUB_OFFLINE=1
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-sec-srv-8f2e-4b9a-1c5d-0e3f-6g7h8i9j}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ai:
        condition: service_started
      chromadb:
        condition: service_started
    restart: always
    networks:
      - llm_net

  chat-worker:
    build: 
      context: ./chat
    container_name: llm_orchestrator_chat_worker
    restart: unless-stopped
    command: huey_consumer.py tasks.huey -w 2 -k thread
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgres:5432/${DB_NAME:-llm_orchestrator}
      - REDIS_URL=${REDIS_URL_WORKER:-redis://redis:6379/1}
      - CHROMA_HOST=${CHROMA_HOST:-chromadb}
      - CHROMA_PORT=${CHROMA_PORT:-8000}
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-changeme-chroma-token}
      - EMBED_MODEL=all-MiniLM-L6-v2
      - TRANSFORMERS_OFFLINE=1
      - HF_HUB_OFFLINE=1
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://ai:5003}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-sec-srv-8f2e-4b9a-1c5d-0e3f-6g7h8i9j}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      chat:
        condition: service_started
    networks:
      - llm_net

  frontend:
    build: 
      context: ./frontend
    image: llm-frontend:latest
    container_name: llm_orchestrator_ui
    environment:
      - VITE_API_GATEWAY=
    restart: always
    networks:
      - llm_net

volumes:
  redis_data:
  postgres_data:
  chroma_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  llm_net:
    driver: bridge