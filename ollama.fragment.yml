  # ── Ollama (local LLM runtime — swap to vLLM by changing image/config) ──────
  ollama:
    image: ollama/ollama:latest
    container_name: llm_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama     # persist downloaded models
    environment:
      - OLLAMA_HOST=0.0.0.0             # listen on all interfaces
      - OLLAMA_ORIGINS=*                # allow all CORS origins
      - OLLAMA_NUM_PARALLEL=2           # concurrent generation slots
      - OLLAMA_MAX_LOADED_MODELS=1      # keep 1 model in GPU/RAM
    restart: always
    # GPU support — uncomment if you have NVIDIA GPU + nvidia-container-toolkit
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s   # give time for model pull on first boot
